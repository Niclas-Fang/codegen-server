[workspace]
authors = ["Your Name <1033478553@qq.com>"]
channels = ["conda-forge"]
name = "codegen-server"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
migrate = { cmd = "python manage.py migrate", cwd = "codegen" }
makemigrations = { cmd = "python manage.py makemigrations", cwd = "codegen" }
dev = { cmd = "DJANGO_DEBUG=true python manage.py runserver", cwd = "codegen" }
test = { cmd = "python test_api.py", cwd = "codegen" }
serve = { cmd = "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile -", cwd = "codegen" }
index = { cmd = "python -m completion.rag.indexer index", cwd = "codegen" }
index-full = { cmd = "python -m completion.rag.indexer index --full", cwd = "codegen" }

[dependencies]
python = ">=3.14.1,<3.15"
pip = ">=25.3,<26"
django = ">=6.0,<7"

[pypi-dependencies]
django-stubs = ">=5.2.8, <6"
requests = "*"
networkx = "*"
sentence-transformers = ">=5.4.1, <6"
faiss-cpu = ">=1.13.2, <6"
gunicorn = "*"
